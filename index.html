<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ElectroSim</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#0a0e14;color:#c8d8e8;font-family:sans-serif;overflow:hidden;touch-action:none;}
.app{display:flex;flex-direction:column;width:100%;height:100%;height:100dvh;}
.top{display:flex;align-items:center;gap:4px;padding:5px 8px;background:#111825;border-bottom:1px solid #1e2d45;flex-shrink:0;overflow-x:auto;}
.top::-webkit-scrollbar{display:none;}
.logo{font-size:14px;font-weight:900;color:#00d4ff;white-space:nowrap;margin-right:4px;}
.btn{padding:7px 11px;border:1.5px solid #2a3a50;background:#141c2a;color:#c8d8e8;font-size:11px;border-radius:6px;cursor:pointer;white-space:nowrap;font-weight:600;flex-shrink:0;}
.btn.act{background:#00d4ff;color:#000;border-color:#00d4ff;}
.btn.grn{border-color:#39ff14;color:#39ff14;}
.btn.grn.act{background:#39ff14;color:#000;}
.btn.red{border-color:#ff4444;color:#ff4444;}
.body{display:flex;flex:1;min-height:0;}
.pal{width:90px;flex-shrink:0;background:#111825;border-right:1px solid #1e2d45;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.pal::-webkit-scrollbar{display:none;}
.pal-hd{padding:5px 6px;font-size:8px;color:#4a6070;border-bottom:1px solid #1e2d45;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.grp{padding:5px 5px 1px;font-size:7px;color:#3a5060;font-weight:700;text-transform:uppercase;letter-spacing:1px;}
.pi{display:flex;flex-direction:column;align-items:center;gap:1px;padding:6px 3px;margin:2px 3px;border:1.5px solid transparent;border-radius:6px;cursor:pointer;user-select:none;}
.pi svg{width:36px;height:22px;pointer-events:none;}
.pi span{font-size:8px;color:#8aa0b4;text-align:center;line-height:1.2;pointer-events:none;}
.pi.sel{border-color:#00d4ff;background:rgba(0,212,255,0.14);}
.cvarea{flex:1;position:relative;min-width:0;background:#0a0e14;
  background-image:radial-gradient(circle,rgba(0,212,255,0.05) 1px,transparent 1px);
  background-size:22px 22px;}
#cv{position:absolute;top:0;left:0;width:100%;height:100%;touch-action:none;}
.banner{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
  background:rgba(0,212,255,0.18);border:1px solid #00d4ff;color:#00d4ff;
  font-size:10px;padding:5px 14px;border-radius:20px;pointer-events:none;
  white-space:nowrap;opacity:0;transition:opacity .2s;z-index:10;}
.banner.show{opacity:1;}
.sheet{position:fixed;bottom:0;left:0;right:0;background:#111825;
  border-top:2px solid #00d4ff;border-radius:14px 14px 0 0;
  max-height:58vh;transform:translateY(100%);transition:transform .2s ease;
  z-index:500;display:flex;flex-direction:column;}
.sheet.open{transform:translateY(0);}
.sh-drag{width:36px;height:4px;background:#2a3a50;border-radius:2px;margin:8px auto 4px;flex-shrink:0;}
.sh-hd{display:flex;align-items:center;justify-content:space-between;padding:2px 14px 8px;border-bottom:1px solid #1e2d45;flex-shrink:0;}
.sh-hd h3{font-size:13px;font-weight:700;}
.sh-hd button{background:none;border:none;color:#4a6070;font-size:24px;cursor:pointer;line-height:1;padding:0 4px;}
.sh-body{overflow-y:auto;padding:10px 14px 28px;-webkit-overflow-scrolling:touch;}
.sh-body::-webkit-scrollbar{width:3px;}
.sh-body::-webkit-scrollbar-thumb{background:#1e2d45;}
.stl{font-size:9px;font-weight:700;color:#00d4ff;letter-spacing:1.5px;text-transform:uppercase;margin:10px 0 6px;}
.rw{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.rw label{font-size:11px;color:#4a6070;flex:1;min-width:60px;}
.rw input,.rw select{flex:1.5;background:#0a0e14;border:1px solid #1e2d45;color:#c8d8e8;padding:7px 8px;font-size:12px;border-radius:4px;min-width:0;}
.rw input[type=range]{padding:2px 0;accent-color:#00d4ff;}
.badge{display:inline-block;padding:5px 12px;border-radius:20px;font-size:12px;margin:2px;}
.ok{background:rgba(57,255,20,0.1);color:#39ff14;border:1px solid #39ff14;}
.no{background:rgba(255,68,68,0.1);color:#ff6666;border:1px solid #ff4444;}
.tog{width:100%;padding:11px;background:rgba(0,212,255,0.1);border:1.5px solid #00d4ff;color:#00d4ff;font-size:13px;font-weight:700;border-radius:6px;margin:6px 0;cursor:pointer;}
.dbtn{width:100%;padding:11px;background:transparent;border:1.5px solid #ff4444;color:#ff4444;font-size:13px;border-radius:6px;margin-top:4px;cursor:pointer;}
.stbar{padding:3px 10px;background:#111825;border-top:1px solid #1e2d45;display:flex;gap:10px;flex-shrink:0;align-items:center;}
.stbar span{font-size:9px;color:#4a6070;}
.stbar .v{color:#00d4ff;}.stbar .on{color:#39ff14;}
</style>

<body>
<div class="app">
  <div class="top">
    <div class="logo">⚡SIM</div>
    <button class="btn act" id="bSel" onclick="setMode('sel')">▶ Pilih</button>
    <button class="btn" id="bWire" onclick="setMode('wire')">〰 Wire</button>
    <button class="btn" id="bDel" onclick="setMode('del')">✕ Del</button>
    <button class="btn grn" id="bRun" onclick="toggleSim()">▶ Run</button>
    <button class="btn red" onclick="clearAll()">🗑</button>
  </div>
  <div class="body">
    <div class="pal" id="pal"><div class="pal-hd">Komponen</div></div>
    <div class="cvarea" id="cvarea">
      <canvas id="cv"></canvas>
      <div class="banner" id="banner"></div>
    </div>
  </div>
  <div class="stbar">
    <span>Komp:<span class="v" id="sc"> 0</span></span>
    <span>Wire:<span class="v" id="sw"> 0</span></span>
    <span id="ssim">Sim:<span class="v"> OFF</span></span>
    <span id="smode" style="margin-left:auto">Mode:<span class="v"> SELECT</span></span>
  </div>
</div>
<div class="sheet" id="sheet">
  <div class="sh-drag" onclick="closeSheet()"></div>
  <div class="sh-hd"><h3 id="sh-title">Properties</h3><button onclick="closeSheet()">×</button></div>
  <div class="sh-body" id="sh-body"></div>
</div>
<script>
// ══════════════════════════════════════════════════════════
// ELECTROSIM — FIXED SIMULATION + NEW COMPONENTS
// ══════════════════════════════════════════════════════════
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
const cvarea=document.getElementById('cvarea');

let mode='sel', pending=null;
let comps=[], wires=[];
let sel=null, wireFrom=null;
let drag=null, dragOff={x:0,y:0};
let mx=0, my=0, simOn=false, uid=1;
let ptDown=null;
let flashState=false;
let flashTimer=null;
let shortCircuit=false;
let shortPoints=[];
let circuitCurrent=0;
let circuitVoltage=0;
let circuitResistance=0;
let sparks=[];
let shortWarningAlpha=0;

// ── COMPONENT DEFINITIONS ────────────────────────────────
const DEFS={
  battery:{nm:'Baterai',w:80,h:50,def:{voltage:12,type:'DC',label:'BAT'},
    pins:[{x:0,y:25,n:'+'},{x:80,y:25,n:'-'}]},
  resistor:{nm:'Resistor',w:70,h:40,def:{resistance:1000,unit:'Ω',tolerance:5,label:'R'},
    pins:[{x:0,y:20,n:'1'},{x:70,y:20,n:'2'}]},
  capacitor:{nm:'Kapasitor',w:60,h:50,def:{capacitance:100,unit:'µF',voltage_rating:25,type:'Electrolytic',label:'C'},
    pins:[{x:0,y:25,n:'+'},{x:60,y:25,n:'-'}]},
  inductor:{nm:'Trafo/Ind',w:90,h:50,def:{type:'Inductor',inductance:100,unit:'mH',primary_v:220,secondary_v:12,turns_ratio:'1:1',label:'L'},
    pins:[{x:0,y:22,n:'1'},{x:90,y:22,n:'2'}]},
  diode:{nm:'Dioda',w:70,h:44,def:{model:'1N4007',type:'Rectifier',vf:0.7,if_max:1000,piv:100,label:'D'},
    pins:[{x:0,y:22,n:'A'},{x:70,y:22,n:'K'}]},
  transistor:{nm:'Transistor',w:72,h:72,def:{type:'NPN',model:'BC547',hfe:100,ic_max:500,vbe:0.6,label:'Q'},
    pins:[{x:0,y:36,n:'B'},{x:72,y:14,n:'C'},{x:72,y:58,n:'E'}]},
  bulb:{nm:'Bohlam',w:62,h:72,def:{type:'LED',color:'White',voltage:3.3,current:20,wattage:5,filaments:1,label:'LED'},
    pins:[{x:0,y:34,n:'+'},{x:62,y:34,n:'-'}]},
  switch:{nm:'Saklar',w:72,h:44,def:{state:'Open',type:'SPST',pins_count:2,label:'SW'},
    pins:[{x:0,y:22,n:'1'},{x:72,y:22,n:'2'}]},
  pushbutton:{nm:'Push Button',w:72,h:44,def:{state:'Open',label:'PB'},
    pins:[{x:0,y:22,n:'1'},{x:72,y:22,n:'2'}]},
  relay:{nm:'Relay',w:82,h:84,def:{coil_voltage:12,coil_current:100,contact_type:'SPDT',contact_rating:10,pins_count:5,label:'RLY'},
    pins:[{x:0,y:28,n:'A1'},{x:0,y:56,n:'A2'},{x:82,y:22,n:'C'},{x:82,y:42,n:'NO'},{x:82,y:62,n:'NC'}]},
  flasher:{nm:'Flasher',w:72,h:60,def:{interval:500,duty:50,label:'FL'},
    pins:[{x:0,y:30,n:'+'},{x:72,y:30,n:'-'},{x:36,y:0,n:'OUT'}]},
  motor:{nm:'Motor DC',w:64,h:64,def:{voltage:12,rpm:3000,current:500,label:'M'},
    pins:[{x:0,y:32,n:'+'},{x:64,y:32,n:'-'}]},
  buzzer:{nm:'Buzzer',w:58,h:58,def:{voltage:5,frequency:2000,label:'BZ'},
    pins:[{x:0,y:29,n:'+'},{x:58,y:29,n:'-'}]},
  ic:{nm:'IC/Chip',w:82,h:94,def:{model:'NE555',function:'Timer',supply:'5-15V',pin_count:8,description:'Timer',label:'U'},
    pins:[{x:0,y:20,n:'1'},{x:0,y:40,n:'2'},{x:0,y:60,n:'3'},{x:0,y:80,n:'4'},{x:82,y:20,n:'5'},{x:82,y:40,n:'6'},{x:82,y:60,n:'7'},{x:82,y:80,n:'8'}]},
  potentiometer:{nm:'Potensio',w:82,h:64,def:{resistance:10000,unit:'Ω',taper:'Linear',position:50,label:'POT'},
    pins:[{x:0,y:32,n:'1'},{x:82,y:32,n:'3'},{x:41,y:0,n:'2'}]},
  fuse:{nm:'Fuse',w:72,h:44,def:{rating:5,type:'Fast-blow',voltage_rating:250,blown:false,label:'F'},
    pins:[{x:0,y:22,n:'1'},{x:72,y:22,n:'2'}]},
  voltmeter:{nm:'Voltmeter',w:64,h:64,def:{range:30,unit:'V',label:'VM'},
    pins:[{x:0,y:32,n:'+'},{x:64,y:32,n:'-'}]},
  ground:{nm:'Ground',w:42,h:52,def:{label:'GND'},
    pins:[{x:21,y:0,n:'GND'}]},
};

// ── HELPERS ──────────────────────────────────────────────
function getPins(c){return DEFS[c.type].pins.map(p=>({x:c.x+p.x,y:c.y+p.y,n:p.n}));}
function pk(x,y){return Math.round(x)+','+Math.round(y);}
function pinAt(x,y){
  for(const c of comps){
    const ps=getPins(c);
    for(let i=0;i<ps.length;i++)if(Math.hypot(ps[i].x-x,ps[i].y-y)<22)return{comp:c,idx:i,pin:ps[i]};
  }
  return null;
}
function compAt(x,y){
  for(let i=comps.length-1;i>=0;i--){
    const c=comps[i],d=DEFS[c.type];
    if(x>=c.x-8&&x<=c.x+d.w+8&&y>=c.y-8&&y<=c.y+d.h+8)return c;
  }
  return null;
}
function wireDist(w,x,y){
  const dx=w.x2-w.x1,dy=w.y2-w.y1;
  if(!dx&&!dy)return Math.hypot(w.x1-x,w.y1-y);
  const t=Math.max(0,Math.min(1,((x-w.x1)*dx+(y-w.y1)*dy)/(dx*dx+dy*dy)));
  return Math.hypot(w.x1+t*dx-x,w.y1+t*dy-y);
}
function fv(v,u){v=Number(v);if(v>=1e6)return(v/1e6).toFixed(1)+'M'+u;if(v>=1e3)return(v/1e3).toFixed(1)+'k'+u;return v+(u||'');}
function _L(x1,y1,x2,y2){ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();}

// ═══════════════════════════════════════════════════════════
// SIMULATION — PROPER CLOSED LOOP DETECTION
// Circuit only works if there is a complete path from
// battery (+) through components back to battery (-)
// ═══════════════════════════════════════════════════════════
// ══════════════════════════════════════════════════════════
// SIMULASI — CLOSED LOOP + SHORT CIRCUIT + OHM'S LAW
// ══════════════════════════════════════════════════════════
function runSim(){
  if(!simOn)return;
  comps.forEach(c=>{ if(c.type!=='battery') c.lit=false; });
  comps.filter(c=>c.type==='battery').forEach(c=>c.lit=true);
  wires.forEach(w=>w.powered=false);
  shortCircuit=false; shortPoints=[];

  comps.filter(c=>c.type==='battery').forEach(bat=>{
    const bp=getPins(bat);
    circuitVoltage=parseFloat(bat.props.voltage)||12;

    // ── Deteksi SHORT CIRCUIT ──────────────────────────────
    // Short = jalur dari + ke - HANYA lewat wire (tanpa komponen beban)
    const directPlus=bfsWireOnly(bp[0].x,bp[0].y);
    const directMinus=bfsWireOnly(bp[1].x,bp[1].y);
    // Cek apakah ada titik wire yang sama di kedua set
    let shorted=false;
    directPlus.forEach(k=>{ if(directMinus.has(k)) shorted=true; });

    if(shorted){
      shortCircuit=true;
      circuitResistance=0.001; // hampir 0 ohm
      circuitCurrent=circuitVoltage/0.001; // arus sangat besar
      // Temukan titik percikan (junction antara + dan -)
      directPlus.forEach(k=>{
        if(directMinus.has(k)){
          const [sx,sy]=k.split(',').map(Number);
          shortPoints.push({x:sx,y:sy});
        }
      });
      // Auto-blow fuse yang ada di rangkaian
      comps.filter(c=>c.type==='fuse'&&!c.props.blown).forEach(f=>{
        const fps=getPins(f);
        if(fps.some(p=>directPlus.has(pk(p.x,p.y)))||
           fps.some(p=>directMinus.has(pk(p.x,p.y)))){
          f.props.blown=true;
          addSparks(f.x+36,f.y+22,20);
          showBanner('💥 FUSE '+f.props.label+' PUTUS! Short circuit!');
        }
      });
      // Wires yang short jadi merah
      wires.forEach(w=>{
        if((directPlus.has(pk(w.x1,w.y1))||directPlus.has(pk(w.x2,w.y2)))&&
           (directMinus.has(pk(w.x1,w.y1))||directMinus.has(pk(w.x2,w.y2)))){
          w.powered=true; w.shorted=true;
        }
      });
      // Percikan di titik short
      shortPoints.forEach(sp=>addSparks(sp.x,sp.y,15));
      bat.lit=true;
      if(simOn)setTimeout(runSim,200);
      return;
    }

    // ── Rangkaian Normal — Iterative ──────────────────────
    let changed=true, iter=0;
    while(changed&&iter++<25){
      changed=false;
      const fromPlus =bfsLitOnly(bp[0].x,bp[0].y,bat);
      const fromMinus=bfsLitOnly(bp[1].x,bp[1].y,bat);
      comps.forEach(c=>{
        if(c.lit||c===bat) return;
        if(!compAllowsCurrent(c)) return;
        const ps=getPins(c);
        let found=false;
        for(let i=0;i<ps.length&&!found;i++){
          if(!fromPlus.has(pk(ps[i].x,ps[i].y))) continue;
          for(let j=0;j<ps.length&&!found;j++){
            if(i===j) continue;
            if(fromMinus.has(pk(ps[j].x,ps[j].y))) found=true;
          }
        }
        if(found){ c.lit=true; changed=true; }
      });
    }

    // ── Kalkulasi Arus (Ohm's Law) ─────────────────────────
    const litResistors=comps.filter(c=>c.lit&&c.type==='resistor');
    const totalR=litResistors.reduce((sum,r)=>{
      let rv=parseFloat(r.props.resistance)||1000;
      if(r.props.unit==='kΩ') rv*=1000;
      if(r.props.unit==='MΩ') rv*=1000000;
      return sum+rv;
    },0);
    circuitResistance=totalR||Infinity;
    circuitCurrent=totalR>0?(circuitVoltage/totalR)*1000:0; // mA

    // ── Auto-blow fuse jika arus melebihi rating ──────────
    comps.filter(c=>c.lit&&c.type==='fuse'&&!c.props.blown).forEach(f=>{
      const ratingA=parseFloat(f.props.rating)||5;
      const currentA=circuitCurrent/1000;
      if(currentA>ratingA){
        f.props.blown=true;
        addSparks(f.x+36,f.y+22,12);
        showBanner('💥 FUSE '+f.props.label+' PUTUS! '+currentA.toFixed(2)+'A > '+ratingA+'A');
        if(simOn)setTimeout(runSim,100);
      }
    });

    // ── Powered wires ──────────────────────────────────────
    const fp2=bfsLitOnly(bp[0].x,bp[0].y,bat);
    const fm2=bfsLitOnly(bp[1].x,bp[1].y,bat);
    wires.forEach(w=>{
      const k1=pk(w.x1,w.y1),k2=pk(w.x2,w.y2);
      if((fp2.has(k1)||fp2.has(k2))&&(fm2.has(k1)||fm2.has(k2))){
        w.powered=true; w.shorted=false;
      }
    });
  });

  if(simOn)setTimeout(runSim,150);
}

// BFS hanya lewat wire (untuk deteksi short circuit)
function bfsWireOnly(sx,sy){
  const reached=new Set();
  const queue=[[sx,sy]];
  while(queue.length){
    const [x,y]=queue.shift();
    const k=pk(x,y);
    if(reached.has(k)) continue;
    reached.add(k);
    for(const w of wires){
      if(Math.hypot(w.x1-x,w.y1-y)<12&&!reached.has(pk(w.x2,w.y2))) queue.push([w.x2,w.y2]);
      if(Math.hypot(w.x2-x,w.y2-y)<12&&!reached.has(pk(w.x1,w.y1))) queue.push([w.x1,w.y1]);
    }
  }
  return reached;
}

// BFS hanya lewat wire + komponen yang sudah LIT
function bfsLitOnly(sx,sy,sourceComp){
  const reached=new Set();
  const queue=[[sx,sy]];
  while(queue.length){
    const [x,y]=queue.shift();
    const k=pk(x,y);
    if(reached.has(k)) continue;
    reached.add(k);
    // lewat wire
    for(const w of wires){
      if(Math.hypot(w.x1-x,w.y1-y)<12&&!reached.has(pk(w.x2,w.y2))) queue.push([w.x2,w.y2]);
      if(Math.hypot(w.x2-x,w.y2-y)<12&&!reached.has(pk(w.x1,w.y1))) queue.push([w.x1,w.y1]);
    }
    // lewat komponen yang sudah LIT (bukan sumber) saja
    for(const c of comps){
      if(!c.lit||c===sourceComp) continue;
      if(!compAllowsCurrent(c)) continue;
      const ps=getPins(c);
      const hi=ps.findIndex(p=>Math.hypot(p.x-x,p.y-y)<12);
      if(hi<0) continue;
      ps.forEach((p,i)=>{ if(i!==hi&&!reached.has(pk(p.x,p.y))) queue.push([p.x,p.y]); });
    }
  }
  return reached;
}

function compAllowsCurrent(c){
  if(c.type==='switch'&&c.props.state==='Open') return false;
  if(c.type==='pushbutton'&&c.props.state==='Open') return false;
  if(c.type==='fuse'&&c.props.blown) return false;
  if(c.type==='flasher'&&!flashState) return false;
  return true;
}

// ── SPARK PARTICLES ──────────────────────────────────────
function addSparks(x,y,n){
  for(let i=0;i<n;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=1+Math.random()*4;
    sparks.push({
      x,y,
      vx:Math.cos(angle)*speed,
      vy:Math.sin(angle)*speed,
      life:1.0,
      decay:0.04+Math.random()*0.06,
      size:1+Math.random()*3,
      color:Math.random()>0.5?'#ff4400':'#ffaa00'
    });
  }
}
function updateSparks(){
  sparks=sparks.filter(s=>s.life>0);
  sparks.forEach(s=>{s.x+=s.vx;s.y+=s.vy;s.vy+=0.15;s.life-=s.decay;s.vx*=0.95;});
}
function drawSparks(){
  sparks.forEach(s=>{
    ctx.save();
    ctx.globalAlpha=s.life;
    ctx.beginPath();ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
    ctx.fillStyle=s.color;ctx.shadowColor=s.color;ctx.shadowBlur=6;ctx.fill();
    ctx.restore();
  });
}

// ── FLASHER TIMER ────────────────────────────────────────
function startFlasher(){
  stopFlasher();
  // Find min interval
  const fls=comps.filter(c=>c.type==='flasher');
  const interval=fls.length?Math.max(100,parseInt(fls[0].props.interval)||500):500;
  flashTimer=setInterval(()=>{flashState=!flashState;if(simOn)runSim();},interval);
}
function stopFlasher(){if(flashTimer){clearInterval(flashTimer);flashTimer=null;}}

// ── DRAW COMPONENT ───────────────────────────────────────
function drawComp(c,ghost){
  const x=c.x,y=c.y,p=c.props,lit=(c.lit&&simOn);
  ctx.save();
  if(ghost)ctx.globalAlpha=0.4;
  ctx.shadowBlur=0;

  switch(c.type){
    case 'battery':{
      const col=lit?'#ffe066':'#ffd700';
      if(lit){ctx.shadowColor=col;ctx.shadowBlur=14;}
      ctx.strokeStyle=col;ctx.fillStyle=col;ctx.lineWidth=2;
      ctx.strokeRect(x+14,y+12,52,26);
      _L(x,y+25,x+14,y+25);_L(x+66,y+25,x+80,y+25);
      _L(x+22,y+25,x+30,y+25);_L(x+26,y+21,x+26,y+29);_L(x+50,y+25,x+58,y+25);
      ctx.font='9px sans-serif';ctx.textAlign='center';
      ctx.fillText((p?.voltage||12)+'V '+(p?.type||'DC'),x+40,y+47);
      break;
    }
    case 'resistor':{
      const col=lit?'#ffb347':'#ff9500';
      ctx.strokeStyle=col;ctx.fillStyle=col;ctx.lineWidth=2;
      _L(x,y+20,x+15,y+20);ctx.strokeRect(x+15,y+12,40,16);_L(x+55,y+20,x+70,y+20);
      ctx.font='9px sans-serif';ctx.textAlign='center';
      if(p)ctx.fillText(fv(p.resistance,p.unit),x+35,y+37);
      break;
    }
    case 'capacitor':{
      const col=lit?'#7fff00':'#39ff14';
      ctx.strokeStyle=col;ctx.fillStyle=col;ctx.lineWidth=2;
      _L(x,y+25,x+27,y+25);_L(x+27,y+8,x+27,y+42);_L(x+33,y+8,x+33,y+42);_L(x+33,y+25,x+60,y+25);
      ctx.font='9px sans-serif';ctx.textAlign='center';
      if(p)ctx.fillText(fv(p.capacitance,p.unit),x+30,y+47);
      break;
    }
    case 'inductor':{
      const col=lit?'#ff9999':'#f87171';ctx.strokeStyle=col;ctx.fillStyle=col;ctx.lineWidth=2;
      if(p?.type==='Transformer'){
        _L(x,y+22,x+14,y+22);_L(x+76,y+22,x+90,y+22);
        ctx.strokeRect(x+14,y+8,28,28);ctx.strokeRect(x+48,y+8,28,28);
        ctx.setLineDash([2,2]);_L(x+43,y+8,x+43,y+36);ctx.setLineDash([]);
        ctx.font='8px sans-serif';ctx.textAlign='center';
        ctx.fillText((p.primary_v)+'V',x+28,y+25);ctx.fillText((p.secondary_v)+'V',x+62,y+25);
      } else {
        _L(x,y+22,x+10,y+22);
        ctx.beginPath();ctx.moveTo(x+10,y+22);
        for(let i=0;i<4;i++)ctx.arc(x+10+i*16+8,y+22,8,Math.PI,0,false);
        ctx.stroke();_L(x+74,y+22,x+90,y+22);
        ctx.font='9px sans-serif';ctx.textAlign='center';
        if(p)ctx.fillText(fv(p.inductance,p.unit),x+45,y+40);
      }break;
    }
    case 'diode':{
      const col=lit?'#93c5fd':'#60a5fa';
      if(lit){ctx.shadowColor=col;ctx.shadowBlur=10;}
      ctx.strokeStyle=col;ctx.fillStyle=col+'55';ctx.lineWidth=2;
      _L(x,y+22,x+18,y+22);
      ctx.beginPath();ctx.moveTo(x+18,y+8);ctx.lineTo(x+18,y+36);ctx.lineTo(x+42,y+22);ctx.closePath();ctx.stroke();ctx.fill();
      ctx.fillStyle=col;_L(x+42,y+8,x+42,y+36);_L(x+42,y+22,x+70,y+22);
      ctx.font='8px sans-serif';ctx.textAlign='center';
      if(p)ctx.fillText(p.model,x+35,y+42);
      break;
    }
    case 'transistor':{
      const col=lit?'#d8b4fe':'#c084fc';
      if(lit){ctx.shadowColor=col;ctx.shadowBlur=10;}
      ctx.strokeStyle=col;ctx.fillStyle=col;ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(x+36,y+36,22,0,Math.PI*2);ctx.stroke();
      _L(x,y+36,x+24,y+36);_L(x+24,y+16,x+24,y+56);
      _L(x+24,y+22,x+48,y+14);_L(x+72,y+14,x+48,y+14);
      _L(x+24,y+50,x+48,y+58);_L(x+72,y+58,x+48,y+58);
      if(!p||p.type==='NPN'){ctx.beginPath();ctx.moveTo(x+44,y+57);ctx.lineTo(x+56,y+62);ctx.lineTo(x+50,y+52);ctx.closePath();ctx.fill();}
      ctx.font='8px sans-serif';ctx.textAlign='center';
      if(p)ctx.fillText((p.type||'NPN')+' '+(p.model||''),x+36,y+70);
      break;
    }
    case 'bulb':{
      const col=lit?'#ffffa0':(p?.type==='LED'?'#00d4ff':'#ffdd00');
      if(lit){ctx.shadowColor=col;ctx.shadowBlur=28;}
      ctx.strokeStyle=col;ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(x+31,y+22,18,0,Math.PI*2);ctx.stroke();
      if(lit){ctx.fillStyle=col+'66';ctx.fill();}
      const fs=Math.min(parseInt(p?.filaments||1),5);
      for(let i=0;i<fs;i++){ctx.beginPath();ctx.moveTo(x+18+i*6,y+22);ctx.quadraticCurveTo(x+21+i*6,y+14,x+24+i*6,y+22);ctx.stroke();}
      _L(x+22,y+40,x+22,y+52);_L(x+40,y+40,x+40,y+52);_L(x+22,y+52,x+40,y+52);
      _L(x,y+34,x+13,y+34);_L(x+49,y+34,x+62,y+34);
      ctx.fillStyle=col;ctx.font='9px sans-serif';ctx.textAlign='center';
      ctx.fillText((p?.type||'LED')+(lit?' ON':''),x+31,y+68);
      break;
    }
    case 'switch':{
      const cl=p?.state==='Closed';
      const col=cl?'#00ffff':'#00d4ff';
      if(cl){ctx.shadowColor=col;ctx.shadowBlur=8;}
      ctx.strokeStyle=col;ctx.fillStyle=col;ctx.lineWidth=2;
      _L(x,y+22,x+20,y+22);_L(x+52,y+22,x+72,y+22);
      ctx.beginPath();ctx.arc(x+20,y+22,3,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(x+52,y+22,3,0,Math.PI*2);ctx.fill();
      if(cl)_L(x+20,y+22,x+52,y+22);else _L(x+20,y+22,x+48,y+12);
      ctx.font='8px sans-serif';ctx.textAlign='center';
      ctx.fillText((p?.type||'SPST')+' ['+(p?.state||'Open')+']',x+36,y+40);
      break;
    }
    case 'pushbutton':{
      const cl=p?.state==='Closed';
      const col=cl?'#ff9900':'#ff6600';
      if(cl){ctx.shadowColor=col;ctx.shadowBlur=10;}
      ctx.strokeStyle=col;ctx.fillStyle=col;ctx.lineWidth=2;
      _L(x,y+22,x+20,y+22);_L(x+52,y+22,x+72,y+22);
      ctx.beginPath();ctx.arc(x+20,y+22,3,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(x+52,y+22,3,0,Math.PI*2);ctx.fill();
      if(cl)_L(x+20,y+22,x+52,y+22);else _L(x+20,y+22,x+52,y+22-10);
      // push button symbol - vertical line
      _L(x+36,y+8,x+36,y+14);_L(x+28,y+14,x+44,y+14);
      ctx.font='8px sans-serif';ctx.textAlign='center';
      ctx.fillText('PUSH ['+(p?.state||'Open')+']',x+36,y+40);
      break;
    }
    case 'relay':{
      const col=lit?'#ff8c5a':'#ff6b35';
      if(lit){ctx.shadowColor=col;ctx.shadowBlur=10;}
      ctx.strokeStyle=col;ctx.fillStyle=col;ctx.lineWidth=2;
      ctx.strokeRect(x+14,y+8,54,68);
      for(let i=0;i<4;i++){ctx.beginPath();ctx.arc(x+22+i*8,y+28,4,Math.PI,0,false);ctx.stroke();}
      ctx.font='8px sans-serif';ctx.textAlign='center';
      ctx.fillText('RELAY',x+41,y+52);ctx.fillText((p?.coil_voltage||12)+'V',x+41,y+62);
      _L(x,y+28,x+14,y+28);_L(x,y+56,x+14,y+56);
      _L(x+68,y+22,x+82,y+22);_L(x+68,y+42,x+82,y+42);_L(x+68,y+62,x+82,y+62);
      ctx.font='7px sans-serif';ctx.textAlign='left';
      ctx.fillText('C',x+69,y+24);ctx.fillText('NO',x+69,y+44);ctx.fillText('NC',x+69,y+64);
      break;
    }
    case 'flasher':{
      const fon=lit&&flashState;
      const col=fon?'#ffee00':'#fbbf24';
      if(fon){ctx.shadowColor=col;ctx.shadowBlur=16;}
      ctx.strokeStyle=col;ctx.fillStyle=col;ctx.lineWidth=2;
      ctx.strokeRect(x+10,y+12,52,36);
      // flash symbol inside
      ctx.font='18px sans-serif';ctx.textAlign='center';
      ctx.fillText(fon?'⚡':'⚡',x+36,y+35);
      ctx.font='8px sans-serif';
      ctx.fillText('FLASHER',x+36,y+54);
      if(p)ctx.fillText((p.interval||500)+'ms',x+36,y+62);
      _L(x,y+30,x+10,y+30);_L(x+62,y+30,x+72,y+30);_L(x+36,y+12,x+36,y);
      ctx.font='7px sans-serif';ctx.textAlign='center';ctx.fillStyle=col;
      ctx.fillText('OUT',x+36,y-3);
      break;
    }
    case 'motor':{
      const col=lit?'#34d399':'#10b981';
      if(lit){ctx.shadowColor=col;ctx.shadowBlur=16;}
      ctx.strokeStyle=col;ctx.fillStyle=col;ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(x+32,y+32,22,0,Math.PI*2);ctx.stroke();
      // spinning symbol when lit
      if(lit){
        const angle=Date.now()/200;
        ctx.save();ctx.translate(x+32,y+32);ctx.rotate(angle);
        ctx.strokeStyle=col;ctx.lineWidth=2;
        for(let i=0;i<4;i++){
          const a=i*Math.PI/2;
          ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(a)*16,Math.sin(a)*16);ctx.stroke();
        }
        ctx.restore();
      } else {
        ctx.font='14px sans-serif';ctx.textAlign='center';ctx.fillText('M',x+32,y+37);
      }
      ctx.font='8px sans-serif';ctx.textAlign='center';
      ctx.fillText('MOTOR',x+32,y+60);
      if(p)ctx.fillText((p.rpm||3000)+' RPM',x+32,y+68);
      _L(x,y+32,x+10,y+32);_L(x+54,y+32,x+64,y+32);
      break;
    }
    case 'buzzer':{
      const col=lit?'#f472b6':'#ec4899';
      if(lit){ctx.shadowColor=col;ctx.shadowBlur=12;}
      ctx.strokeStyle=col;ctx.fillStyle=col;ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(x+29,y+29,20,0,Math.PI*2);ctx.stroke();
      if(lit){ctx.fillStyle=col+'44';ctx.fill();}
      // sound waves
      if(lit){
        [8,14,20].forEach(r=>{
          ctx.beginPath();ctx.arc(x+29,y+29,r,Math.PI*0.2,Math.PI*0.8);ctx.stroke();
        });
      }
      ctx.font='7px sans-serif';ctx.fillStyle=col;ctx.textAlign='center';
      ctx.fillText('BZ',x+29,y+33);
      ctx.fillText((p?.frequency||2000)+'Hz',x+29,y+56);
      _L(x,y+29,x+9,y+29);_L(x+49,y+29,x+58,y+29);
      break;
    }
    case 'ic':{
      const col=lit?'#6ee7b7':'#34d399';
      if(lit){ctx.shadowColor=col;ctx.shadowBlur=10;}
      ctx.strokeStyle=col;ctx.fillStyle=col+'18';ctx.lineWidth=2;
      ctx.strokeRect(x+14,y+6,54,82);ctx.fill();
      ctx.fillStyle=col;ctx.font='11px sans-serif';ctx.textAlign='center';
      ctx.fillText(p?.model||'IC',x+41,y+32);
      ctx.font='8px sans-serif';ctx.fillText(p?.function||'',x+41,y+48);ctx.fillText(p?.supply||'',x+41,y+62);
      [20,40,60,80].forEach(yy=>{_L(x,y+yy,x+14,y+yy);_L(x+68,y+yy,x+82,y+yy);});
      break;
    }
    case 'potentiometer':{
      ctx.strokeStyle='#a78bfa';ctx.fillStyle='#a78bfa';ctx.lineWidth=2;
      ctx.strokeRect(x+15,y+16,52,32);
      _L(x,y+32,x+15,y+32);_L(x+67,y+32,x+82,y+32);
      const pct=(p?.position||50)/100;const wx=x+15+pct*52;
      _L(wx,y+16,wx,y);
      ctx.beginPath();ctx.moveTo(wx-4,y);ctx.lineTo(wx+4,y);ctx.lineTo(wx,y+5);ctx.closePath();ctx.fill();
      ctx.font='9px sans-serif';ctx.textAlign='center';
      if(p)ctx.fillText(fv(Math.round(p.resistance*pct),p.unit),x+41,y+60);
      break;
    }
    case 'fuse':{
      const bl=p?.blown;
      const col=bl?'#555':(lit?'#fdba74':'#fb923c');
      ctx.strokeStyle=col;ctx.fillStyle=col;ctx.lineWidth=2;
      ctx.strokeRect(x+14,y+12,44,20);
      _L(x,y+22,x+14,y+22);_L(x+58,y+22,x+72,y+22);
      if(bl){ctx.strokeStyle='#ff4444';ctx.beginPath();ctx.moveTo(x+14,y+22);ctx.lineTo(x+24,y+12);ctx.moveTo(x+32,y+12);ctx.lineTo(x+42,y+32);ctx.stroke();
        ctx.fillStyle='#ff4444';ctx.font='8px sans-serif';ctx.textAlign='center';ctx.fillText('BLOWN',x+36,y+40);}
      else{ctx.setLineDash([2,2]);_L(x+14,y+22,x+58,y+22);ctx.setLineDash([]);
        ctx.font='9px sans-serif';ctx.textAlign='center';ctx.fillText((p?.rating||5)+'A',x+36,y+38);}
      break;
    }
    case 'voltmeter':{
      const col=lit?'#38bdf8':'#0ea5e9';
      if(lit){ctx.shadowColor=col;ctx.shadowBlur=8;}
      ctx.strokeStyle=col;ctx.fillStyle=col+'22';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(x+32,y+32,24,0,Math.PI*2);ctx.stroke();ctx.fill();
      ctx.fillStyle=col;ctx.font='10px sans-serif';ctx.textAlign='center';ctx.fillText('V',x+32,y+28);
      // needle
      const nvolt=lit?parseFloat(comps.find(bc=>bc.type==='battery')?.props?.voltage||12):0;
      const maxv=parseFloat(p?.range||30);
      const ang=-Math.PI*0.8+Math.PI*1.6*(Math.min(nvolt,maxv)/maxv);
      ctx.strokeStyle=col;ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(x+32,y+32);ctx.lineTo(x+32+Math.cos(ang)*18,y+32+Math.sin(ang)*18);ctx.stroke();
      ctx.fillStyle=col;ctx.font='10px monospace';ctx.textAlign='center';
      ctx.fillText(lit?nvolt.toFixed(1)+'V':'0.0V',x+32,y+48);
      ctx.font='8px sans-serif';ctx.fillText('VOLT',x+32,y+60);
      _L(x,y+32,x+8,y+32);_L(x+56,y+32,x+64,y+32);
      break;
    }
    case 'ground':{
      ctx.strokeStyle='#78716c';ctx.lineWidth=2;
      _L(x+21,y,x+21,y+14);_L(x+6,y+14,x+36,y+14);_L(x+10,y+20,x+32,y+20);_L(x+14,y+26,x+28,y+26);_L(x+17,y+32,x+25,y+32);
      break;
    }
  }
  ctx.restore();
}

// ── RENDER ────────────────────────────────────────────────
function render(){
  ctx.clearRect(0,0,cv.width,cv.height);
  ctx.shadowBlur=0;

  // ── SHORT CIRCUIT background flash ───────────────────
  if(shortCircuit&&simOn){
    const alpha=0.08+0.06*Math.sin(Date.now()/80);
    ctx.fillStyle=`rgba(255,30,0,${alpha})`;
    ctx.fillRect(0,0,cv.width,cv.height);
  }

  // wires
  for(const w of wires){
    const pw=w.powered&&simOn;
    const sc=w.shorted&&simOn;
    if(sc){
      // Short circuit wire — merah menyala berkedip
      const flicker=0.6+0.4*Math.sin(Date.now()/50);
      ctx.strokeStyle=`rgba(255,${Math.floor(40*flicker)},0,${flicker})`;
      ctx.lineWidth=5;
      ctx.shadowColor='#ff2200';ctx.shadowBlur=16;
    } else if(pw){
      ctx.strokeStyle='#ff7700';ctx.lineWidth=3.5;
      ctx.shadowColor='#ff9500';ctx.shadowBlur=10;
    } else {
      ctx.strokeStyle='#253545';ctx.lineWidth=2;
      ctx.shadowColor='transparent';ctx.shadowBlur=0;
    }
    ctx.beginPath();ctx.moveTo(w.x1,w.y1);ctx.lineTo(w.x2,w.y2);ctx.stroke();
    ctx.shadowBlur=0;
    if(pw&&!sc){
      const t=((Date.now()/14)%60)/60;
      ctx.beginPath();ctx.arc(w.x1+(w.x2-w.x1)*t,w.y1+(w.y2-w.y1)*t,3.5,0,Math.PI*2);
      ctx.fillStyle='#ffe066';ctx.fill();
    }
    // junction dot
    [[w.x1,w.y1],[w.x2,w.y2]].forEach(([jx,jy])=>{
      const n=wires.filter(ow=>ow!==w&&(Math.hypot(ow.x1-jx,ow.y1-jy)<6||Math.hypot(ow.x2-jx,ow.y2-jy)<6)).length;
      if(n>0){ctx.beginPath();ctx.arc(jx,jy,4,0,Math.PI*2);ctx.fillStyle=sc?'#ff2200':pw?'#ff9500':'#4a6a7a';ctx.fill();}
    });
  }

  // temp wire
  if(mode==='wire'&&wireFrom){
    ctx.strokeStyle='rgba(0,212,255,0.6)';ctx.lineWidth=2;ctx.setLineDash([5,5]);
    ctx.beginPath();ctx.moveTo(wireFrom.pin.x,wireFrom.pin.y);ctx.lineTo(mx,my);ctx.stroke();
    ctx.setLineDash([]);
  }

  // components
  for(const c of comps){
    ctx.shadowBlur=0;
    // Jika short circuit, komponen berkedip merah
    if(shortCircuit&&simOn&&c.type!=='battery'){
      const fl=0.5+0.5*Math.sin(Date.now()/60);
      ctx.save();ctx.globalAlpha=fl;
      ctx.fillStyle='rgba(255,0,0,0.25)';
      const d=DEFS[c.type];
      ctx.fillRect(c.x-4,c.y-4,d.w+8,d.h+8);
      ctx.restore();
    }
    drawComp(c,false);
    const d=DEFS[c.type];
    ctx.fillStyle='#3a5570';ctx.font='10px sans-serif';ctx.textAlign='center';ctx.shadowBlur=0;
    ctx.fillText(c.props.label,c.x+d.w/2,c.y-5);
    if(c===sel){
      ctx.strokeStyle='rgba(0,212,255,0.8)';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
      ctx.strokeRect(c.x-6,c.y-6,d.w+12,d.h+12);ctx.setLineDash([]);
    }
    getPins(c).forEach(p=>{
      ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);
      ctx.fillStyle='#0a0e14';ctx.fill();
      ctx.strokeStyle='rgba(0,212,255,0.5)';ctx.lineWidth=1.5;ctx.stroke();
    });
  }

  // sparks
  if(simOn){ updateSparks(); drawSparks(); }

  // SHORT CIRCUIT warning overlay
  if(shortCircuit&&simOn){
    const W=cv.width,H=cv.height;
    // Border merah
    ctx.strokeStyle='rgba(255,0,0,0.7)';ctx.lineWidth=6;
    ctx.strokeRect(3,3,W-6,H-6);
    // Label
    ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(W/2-90,10,180,44);
    ctx.fillStyle='#ff3300';ctx.font='bold 13px sans-serif';ctx.textAlign='center';
    ctx.fillText('⚡ SHORT CIRCUIT! ⚡',W/2,28);
    ctx.fillStyle='#ffaa00';ctx.font='11px sans-serif';
    ctx.fillText(circuitVoltage+'V / ~0Ω = ∞ Ampere',W/2,46);
    // Tambah percikan terus-menerus di titik short
    if(Math.random()<0.4) shortPoints.forEach(sp=>addSparks(sp.x,sp.y,3));
  }

  // ── Info panel arus/tegangan (pojok kanan bawah) ──────
  if(simOn&&!shortCircuit&&circuitCurrent>0){
    const istr=circuitCurrent>=1000?(circuitCurrent/1000).toFixed(2)+'A':circuitCurrent.toFixed(1)+'mA';
    const rstr=circuitResistance===Infinity?'∞':fv(circuitResistance,'Ω');
    const W=cv.width, H=cv.height;
    ctx.fillStyle='rgba(0,0,0,0.65)';ctx.fillRect(W-130,H-54,124,48);
    ctx.strokeStyle='#1e2d45';ctx.lineWidth=1;ctx.strokeRect(W-130,H-54,124,48);
    ctx.fillStyle='#39ff14';ctx.font='10px monospace';ctx.textAlign='left';
    ctx.fillText('V: '+circuitVoltage+'V',W-122,H-36);
    ctx.fillText('I: '+istr,W-122,H-22);
    ctx.fillText('R: '+rstr,W-60,H-22);
  }

  // ghost
  if(pending&&mx>0&&my>0){
    const d=DEFS[pending];
    drawComp({type:pending,x:mx-d.w/2,y:my-d.h/2,props:d.def,lit:false},true);
  }

  document.getElementById('sc').textContent=' '+comps.length;
  document.getElementById('sw').textContent=' '+wires.length;
  if(simOn)requestAnimationFrame(render);
}

// ── SIMULATION TOGGLE ─────────────────────────────────────
function toggleSim(){
  simOn=!simOn;
  const b=document.getElementById('bRun'),s=document.getElementById('ssim');
  if(simOn){
    b.textContent='⏹ Stop';b.classList.add('act');
    s.innerHTML='Sim:<span class="v on"> RUN ⚡</span>';
    flashState=true;startFlasher();
    runSim();requestAnimationFrame(render);
  } else {
    b.textContent='▶ Run';b.classList.remove('act');
    s.innerHTML='Sim:<span class="v"> OFF</span>';
    stopFlasher();
    comps.forEach(c=>c.lit=false);wires.forEach(w=>{w.powered=false;w.shorted=false;});
    shortCircuit=false;shortPoints=[];sparks=[];circuitCurrent=0;circuitResistance=0;
    render();
  }
}

// ── POINTER EVENTS ───────────────────────────────────────
function getXY(e){
  const r=cv.getBoundingClientRect();
  let cx,cy;
  if(e.touches&&e.touches.length>0){cx=e.touches[0].clientX;cy=e.touches[0].clientY;}
  else if(e.changedTouches&&e.changedTouches.length>0){cx=e.changedTouches[0].clientX;cy=e.changedTouches[0].clientY;}
  else{cx=e.clientX;cy=e.clientY;}
  return{x:cx-r.left,y:cy-r.top};
}

cv.addEventListener('touchstart',e=>{e.preventDefault();const{x,y}=getXY(e);ptDown={x,y,t:Date.now()};mx=x;my=y;startDrag(x,y);render();},{passive:false});
cv.addEventListener('touchmove',e=>{e.preventDefault();const{x,y}=getXY(e);mx=x;my=y;if(drag){drag.x=Math.round((x-dragOff.x)/10)*10;drag.y=Math.round((y-dragOff.y)/10)*10;}render();},{passive:false});
cv.addEventListener('touchend',e=>{e.preventDefault();const{x,y}=getXY(e);endInteraction(x,y);},{passive:false});
cv.addEventListener('mousedown',e=>{const{x,y}=getXY(e);ptDown={x,y,t:Date.now()};mx=x;my=y;startDrag(x,y);});
cv.addEventListener('mousemove',e=>{const{x,y}=getXY(e);mx=x;my=y;if(drag){drag.x=Math.round((x-dragOff.x)/10)*10;drag.y=Math.round((y-dragOff.y)/10)*10;}if(!simOn)render();});
cv.addEventListener('mouseup',e=>{const{x,y}=getXY(e);endInteraction(x,y);});

function startDrag(x,y){if(mode==='sel'&&!pending){const c=compAt(x,y);if(c){drag=c;dragOff={x:x-c.x,y:y-c.y};}}}
function endInteraction(x,y){
  const moved=Math.hypot(x-(ptDown?.x||x),y-(ptDown?.y||y));
  const wasDrag=drag&&moved>12;
  drag=null;
  if(!wasDrag&&moved<18)tap(x,y);
  render();
}

// ── TAP ───────────────────────────────────────────────────
function tap(x,y){
  if(pending){
    const d=DEFS[pending];
    const nx=Math.max(0,Math.round((x-d.w/2)/10)*10);
    const ny=Math.max(10,Math.round((y-d.h/2)/10)*10);
    const props=JSON.parse(JSON.stringify(d.def));
    props.label=props.label+(comps.filter(c=>c.type===pending).length+1);
    const c={id:uid++,type:pending,x:nx,y:ny,props,lit:false};
    comps.push(c);sel=c;
    clearPending();showSheet(c);
    if(simOn)runSim();render();return;
  }
  if(mode==='wire'){
    const hp=pinAt(x,y);
    if(hp){
      if(!wireFrom){wireFrom=hp;showBanner('Tap kaki ke-2 untuk sambung wire');}
      else{
        if(hp.comp!==wireFrom.comp){wires.push({x1:wireFrom.pin.x,y1:wireFrom.pin.y,x2:hp.pin.x,y2:hp.pin.y,powered:false});
          if(simOn)runSim();showBanner('✓ Wire tersambung!');}
        wireFrom=null;
      }
    }else{wireFrom=null;hideBanner();}
    render();return;
  }
  if(mode==='del'){
    let bi=-1,bd=999;
    wires.forEach((w,i)=>{const d=wireDist(w,x,y);if(d<bd){bd=d;bi=i;}});
    if(bd<18){wires.splice(bi,1);if(simOn)runSim();render();return;}
    const dc=compAt(x,y);
    if(dc){
      const ps=getPins(dc);
      wires=wires.filter(w=>!ps.some(p=>Math.hypot(w.x1-p.x,w.y1-p.y)<12||Math.hypot(w.x2-p.x,w.y2-p.y)<12));
      comps.splice(comps.indexOf(dc),1);
      if(sel===dc){sel=null;closeSheet();}
      if(simOn)runSim();render();
    }
    return;
  }
  const c=compAt(x,y);
  if(c){
    if(c===sel&&(c.type==='switch'||c.type==='pushbutton')){
      c.props.state=c.props.state==='Open'?'Closed':'Open';
      buildSheetBody(c);if(simOn)runSim();render();return;
    }
    sel=c;showSheet(c);
  }else{sel=null;closeSheet();}
  render();
}

const GROUPS=[
  {t:'⚡ Daya',items:['battery','voltmeter']},
  {t:'💡 Beban',items:['bulb','motor','buzzer']},
  {t:'🔌 Kontrol',items:['switch','pushbutton','relay','flasher','potentiometer']},
  {t:'📦 Pasif',items:['resistor','capacitor','inductor','fuse']},
  {t:'🔬 Semi',items:['diode','transistor','ic']},
  {t:'🌍 Dll',items:['ground']},
];

function buildPalette(){
  const pal=document.getElementById('pal');
  let h='<div class="pal-hd">Komponen</div>';
  GROUPS.forEach(g=>{
    h+=`<div class="grp">${g.t}</div>`;
    g.items.forEach(t=>{
      h+=`<div class="pi" id="pi_${t}" data-type="${t}"><svg viewBox="0 0 38 22" xmlns="http://www.w3.org/2000/svg">${SVGS[t]||''}</svg><span>${DEFS[t].nm}</span></div>`;
    });
  });
  pal.innerHTML=h;
  pal.querySelectorAll('.pi').forEach(el=>{
    const fn=e=>{e.preventDefault();e.stopPropagation();selectPending(el.dataset.type);};
    el.addEventListener('touchend',fn,{passive:false});
    el.addEventListener('click',fn);
  });
}
buildPalette();

function selectPending(t){
  if(pending===t){clearPending();return;}
  pending=t;
  document.querySelectorAll('.pi').forEach(e=>e.classList.remove('sel'));
  document.getElementById('pi_'+t)?.classList.add('sel');
  showBanner('Tap canvas → letakkan '+DEFS[t].nm);
  render();
}
function clearPending(){pending=null;document.querySelectorAll('.pi').forEach(e=>e.classList.remove('sel'));hideBanner();}

// ── BANNER ────────────────────────────────────────────────
let bTimer=null;
function showBanner(msg){const b=document.getElementById('banner');b.textContent=msg;b.classList.add('show');clearTimeout(bTimer);bTimer=setTimeout(hideBanner,3000);}
function hideBanner(){document.getElementById('banner').classList.remove('show');}

// ── MODE ──────────────────────────────────────────────────
function setMode(m){
  mode=m;
  ['bSel','bWire','bDel'].forEach(id=>document.getElementById(id).classList.remove('act'));
  if(m==='sel')document.getElementById('bSel').classList.add('act');
  if(m==='wire')document.getElementById('bWire').classList.add('act');
  if(m==='del')document.getElementById('bDel').classList.add('act');
  document.getElementById('smode').innerHTML='Mode:<span class="v"> '+m.toUpperCase()+'</span>';
  if(m!=='wire')wireFrom=null;
  clearPending();render();
}
function clearAll(){if(!confirm('Hapus semua?'))return;comps=[];wires=[];sel=null;wireFrom=null;clearPending();closeSheet();stopFlasher();render();}

// ── SHEET ─────────────────────────────────────────────────
function showSheet(c){document.getElementById('sh-title').textContent=DEFS[c.type].nm;buildSheetBody(c);document.getElementById('sheet').classList.add('open');}
function closeSheet(){document.getElementById('sheet').classList.remove('open');}
function buildSheetBody(c){
  const p=c.props;
  let h=`<div class="stl">Identitas</div>`;
  h+=R('Label','label','text',p.label,c);
  h+=`<div class="stl">Properties</div>`;
  switch(c.type){
    case 'battery':h+=R('Tegangan V','voltage','number',p.voltage,c,{min:1,max:1000});h+=S('Tipe','type',p.type,['DC','AC','USB 5V','Li-Ion 3.7V','Li-Ion 7.4V','Lead-Acid 6V','Lead-Acid 12V','9V','AA 1.5V'],c);break;
    case 'resistor':h+=R('Nilai','resistance','number',p.resistance,c,{min:1,max:10000000});h+=S('Satuan','unit',p.unit,['Ω','kΩ','MΩ'],c);h+=R('Toleransi %','tolerance','number',p.tolerance,c,{min:1,max:20});break;
    case 'capacitor':h+=R('Kapasitansi','capacitance','number',p.capacitance,c,{min:1,max:100000});h+=S('Satuan','unit',p.unit,['pF','nF','µF','mF'],c);h+=R('Rated V','voltage_rating','number',p.voltage_rating,c,{min:6,max:1000});h+=S('Tipe','type',p.type,['Electrolytic','Ceramic','Film','Tantalum'],c);break;
    case 'inductor':h+=S('Tipe','type',p.type,['Inductor','Transformer'],c);if(p.type==='Transformer'){h+=R('V Primer','primary_v','number',p.primary_v,c,{min:1,max:10000});h+=R('V Sekunder','secondary_v','number',p.secondary_v,c,{min:1,max:1000});}else{h+=R('Induktansi','inductance','number',p.inductance,c,{min:1,max:1000000});h+=S('Satuan','unit',p.unit,['µH','mH','H'],c);}break;
    case 'diode':h+=S('Model','model',p.model,['1N4007','1N4148','1N5408','1N5819','Zener 3V3','Zener 5V1','Zener 12V','Schottky BAT85','LED Red','LED Green','LED Blue'],c);h+=R('Vf V','vf','number',p.vf,c,{min:0.1,max:5,step:0.05});h+=R('If Max mA','if_max','number',p.if_max,c,{min:1,max:50000});h+=R('PIV V','piv','number',p.piv,c,{min:10,max:2000});break;
    case 'transistor':h+=S('Tipe','type',p.type,['NPN','PNP','MOSFET-N','MOSFET-P'],c);h+=R('Model','model','text',p.model,c);h+=R('hFE','hfe','number',p.hfe,c,{min:10,max:10000});h+=R('Ic Max mA','ic_max','number',p.ic_max,c,{min:10,max:500000});break;
    case 'bulb':h+=S('Tipe','type',p.type,['LED','Pijar','CFL','Halogen','Neon'],c);h+=S('Warna','color',p.color,['White','Warm White','Red','Green','Blue','Yellow','Orange','UV'],c);h+=R('Tegangan V','voltage','number',p.voltage,c,{min:1,max:240,step:0.1});h+=R('Arus mA','current','number',p.current,c,{min:1,max:10000});h+=R('Filamen','filaments','number',p.filaments,c,{min:1,max:5});break;
    case 'switch':h+=S('Status','state',p.state,['Open','Closed'],c);h+=S('Tipe','type',p.type,['SPST','SPDT','DPST','DPDT','Toggle','Rotary'],c);h+=R('Jml Kaki','pins_count','number',p.pins_count,c,{min:2,max:12});break;
    case 'pushbutton':h+=S('Status','state',p.state,['Open','Closed'],c);break;
    case 'relay':h+=R('V Koil','coil_voltage','number',p.coil_voltage,c,{min:3,max:48});h+=R('I Koil mA','coil_current','number',p.coil_current,c,{min:10,max:2000});h+=S('Kontak','contact_type',p.contact_type,['SPDT','SPST NO','SPST NC','DPDT'],c);h+=R('Rating A','contact_rating','number',p.contact_rating,c,{min:1,max:100});h+=R('Jml Kaki','pins_count','number',p.pins_count,c,{min:4,max:14});break;
    case 'flasher':
      h+=R('Interval (ms)','interval','number',p.interval,c,{min:100,max:5000});
      h+=R('Duty Cycle %','duty','number',p.duty,c,{min:10,max:90});
      h+=`<div style="padding:8px;background:#1a2535;border-radius:6px;font-size:11px;color:#6a8090;margin-top:8px;">⚡ Flasher menginterupsi arus secara periodik. Hubungkan + dan − ke sumber, OUT ke beban.</div>`;
      break;
    case 'motor':h+=R('Tegangan V','voltage','number',p.voltage,c,{min:1,max:48});h+=R('RPM','rpm','number',p.rpm,c,{min:100,max:100000});h+=R('Arus mA','current','number',p.current,c,{min:10,max:50000});break;
    case 'buzzer':h+=R('Tegangan V','voltage','number',p.voltage,c,{min:1,max:24});h+=R('Frekuensi Hz','frequency','number',p.frequency,c,{min:100,max:20000});break;
    case 'ic':h+=R('Model','model','text',p.model,c);h+=S('Fungsi','function',p.function,['Timer','Op-Amp','Comparator','Voltage Reg','Logic AND','Logic OR','Logic NOT','Counter','Flip-Flop','ADC','DAC','Microcontroller','H-Bridge','PWM'],c);h+=R('Supply','supply','text',p.supply,c);h+=S('Jml Pin','pin_count',p.pin_count,[4,6,8,14,16,18,20,28,32,40],c);break;
    case 'potentiometer':h+=R('Nilai Max','resistance','number',p.resistance,c,{min:100,max:10000000});h+=S('Satuan','unit',p.unit,['Ω','kΩ','MΩ'],c);h+=`<div class="rw"><label>Posisi ${p.position||50}%</label><input type="range" min="0" max="100" value="${p.position||50}" oninput="updP(${c.id},'position',parseInt(this.value));this.previousElementSibling.textContent='Posisi '+this.value+'%'"></div>`;break;
    case 'fuse':h+=R('Rating A','rating','number',p.rating,c,{min:0.1,max:1000,step:0.1});h+=S('Tipe','type',p.type,['Fast-blow','Slow-blow','Semi-delay','Resettable PTC'],c);h+=`<div class="rw"><label>Status</label><select onchange="updP(${c.id},'blown',this.value==='true')"><option value="false" ${!p.blown?'selected':''}>Normal</option><option value="true" ${p.blown?'selected':''}>Blown/Putus</option></select></div>`;break;
    case 'voltmeter':h+=R('Range V','range','number',p.range,c,{min:1,max:1000});break;
  }
  if(simOn){
    h+=`<div class="stl">Hasil Simulasi</div>`;
    h+=c.lit?`<span class="badge ok">✅ ADA ARUS (loop tertutup)</span>`:`<span class="badge no">❌ Tidak ada arus</span>`;
    if(!c.lit&&comps.some(cc=>cc.type==='battery')){
      h+=`<div style="padding:8px;background:#1a1a2a;border-radius:5px;font-size:10px;color:#ff6666;margin-top:6px;">⚠️ Hubungkan kabel dari + baterai → komponen → − baterai untuk membuat loop tertutup</div>`;
    }
    if(c.lit&&c.type==='bulb')h+=`<span class="badge ok">💡 MENYALA</span>`;
    if(c.lit&&c.type==='motor')h+=`<span class="badge ok">🔄 BERPUTAR</span>`;
    if(c.lit&&c.type==='buzzer')h+=`<span class="badge ok">🔊 BERBUNYI</span>`;
    if(c.lit&&c.type==='flasher')h+=`<span class="badge ok">${flashState?'⚡ FLASH ON':'⚡ FLASH OFF'}</span>`;
  }
  if(c.type==='switch'||c.type==='pushbutton'){
    const ns=p.state==='Open'?'Closed':'Open';
    h+=`<button class="tog" onclick="togSW(${c.id})">⇌ Toggle → ${ns}</button>`;
  }
  h+=`<button class="dbtn" onclick="delC(${c.id})">🗑 Hapus</button>`;
  document.getElementById('sh-body').innerHTML=h;
}

function R(l,k,t,v,c,o={}){const ex=Object.entries(o).map(([a,b])=>`${a}="${b}"`).join(' ');return `<div class="rw"><label>${l}</label><input type="${t}" value="${v}" ${ex} oninput="updP(${c.id},'${k}',${t==='number'?'parseFloat(this.value)||0':'this.value'})"></div>`;}
function S(l,k,v,opts,c){const os=opts.map(o=>`<option value="${o}" ${o==v?'selected':''}>${o}</option>`).join('');return `<div class="rw"><label>${l}</label><select onchange="updP(${c.id},'${k}',this.value)">${os}</select></div>`;}
function updP(id,k,v){const c=comps.find(c=>c.id===id);if(!c)return;c.props[k]=v;if(sel?.id===id)buildSheetBody(c);if(!simOn)render();else runSim();}
function togSW(id){const c=comps.find(c=>c.id===id);if(!c)return;c.props.state=c.props.state==='Open'?'Closed':'Open';if(simOn)runSim();buildSheetBody(c);render();}
function delC(id){const c=comps.find(c=>c.id===id);if(!c)return;const ps=getPins(c);wires=wires.filter(w=>!ps.some(p=>Math.hypot(w.x1-p.x,w.y1-p.y)<12||Math.hypot(w.x2-p.x,w.y2-p.y)<12));comps.splice(comps.indexOf(c),1);sel=null;closeSheet();if(simOn)runSim();render();}

// ── RESIZE ────────────────────────────────────────────────
function resize(){const r=cvarea.getBoundingClientRect();cv.width=r.width;cv.height=r.height;render();}
window.addEventListener('resize',resize);
setTimeout(resize,80);
</script>
